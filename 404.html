<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — La M.U.G</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 20vw, 200px);
      color: #C8A050;
      line-height: 1;
      letter-spacing: 8px;
    }
    .msg {
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-gold {
      background: #C8A050;
      color: #0A0A0A;
    }
    .btn-gold:hover { background: #D4AD5A; transform: translateY(-1px); }
    .btn-outline {
      border: 1px solid #2a2a2a;
      color: #FFFFFF;
    }
    .btn-outline:hover { border-color: #FFFFFF; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="msg">Cette page n'existe pas ou a été déplacée.</p>
  <div class="links">
    <a href="index.html" class="btn-gold">Retour à l'accueil</a>
    <a href="booking.html" class="btn-outline">Booking artiste</a>
    <a href="https://boutique.la-mug.com" class="btn-outline">Boutique</a>
  </div>
</body>
</html>
